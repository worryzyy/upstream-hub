services:
  postgres:
    image: postgres:16-alpine
    container_name: upstreamhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upstreamhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-upstreamhub}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upstreamhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # 优先用已发布的镜像（默认 latest，可改成 v0.1.0 等具体版本锁定）。
    # 如果指定的 image 在 ghcr.io 找不到，且本机没缓存，会回落到 build 块从源码构建。
    # 完全离线 / 强制重建：`docker compose build`；强制重新拉：`docker compose pull`。
    image: ghcr.io/worryzyy/upstream-hub:${UPSTREAMHUB_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upstreamhub
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      UPSTREAMHUB_SERVER_PORT: 8418
      UPSTREAMHUB_DATABASE_HOST: postgres
      UPSTREAMHUB_DATABASE_PORT: 5432
      UPSTREAMHUB_DATABASE_USER: ${POSTGRES_USER:-upstreamhub}
      UPSTREAMHUB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      UPSTREAMHUB_DATABASE_NAME: ${POSTGRES_DB:-upstreamhub}
      UPSTREAMHUB_SERVER_MODE: ${UPSTREAMHUB_SERVER_MODE:-release}
      UPSTREAMHUB_LOG_LEVEL: ${UPSTREAMHUB_LOG_LEVEL:-info}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required, set it in .env}
      # 鉴权默认关闭。设 AUTH_ENABLED=true 时 ADMIN_PASSWORD 也必须填，否则后端启动失败。
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
    ports:
      - "${UPSTREAMHUB_HTTP_PORT:-8080}:8418"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8418/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
